<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokeMath</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game">

<h1>PokéMath</h1>

<div class="setup">

<input type="text" id="playerName" placeholder="Seu nome">

<select id="level">
<option value="easy">Fácil</option>
<option value="medium">Médio</option>
<option value="hard">Difícil</option>
</select>

<h3>Escolha seu Pokémon</h3>

<select id="playerPokemon">
<option value="25">Pikachu</option>
<option value="6">Charizard</option>
<option value="9">Blastoise</option>
<option value="3">Venusaur</option>
<option value="94">Gengar</option>
<option value="149">Dragonite</option>
<option value="150">Mewtwo</option>
<option value="65">Alakazam</option>
</select>

<br>

<button onclick="startGame()">Começar</button>

</div>

<div class="timer">
Tempo: <span id="time">03:00</span>
</div>

<div class="battle">

<div>
<h3 id="pokemonName"></h3>
<img id="pokemonSprite">
<div class="hp"><div id="pokemonHP"></div></div>
</div>

<div class="vs">VS</div>

<div>
<h3>Você</h3>
<img id="playerSprite">
<div class="hp"><div id="playerHP"></div></div>
</div>

</div>

<h2 id="question"></h2>

<input type="text" id="answer">
<button onclick="attack()">Responder</button>

<div id="log"></div>

<h3>Pontuação: <span id="score">0</span></h3>

<div class="ranking">
<h3>Ranking</h3>
<ol id="rankingList"></ol>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
